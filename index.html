<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara | Sistema Integral v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37;
            --verde-sahara: #0A1F1A; /* Verde más oscuro y elegante */
            --gris-fondo: #16322C;
            --blanco: #FFFFFF;
            --rojo: #922B21;
            --verde-exito: #1E8449;
        }

        body { font-family: 'Open Sans', sans-serif; background: var(--verde-sahara); color: var(--blanco); margin: 0; overflow-x: hidden; }
        header { background: #050F0D; padding: 15px; text-align: center; border-bottom: 2px solid var(--oro); position: sticky; top: 0; z-index: 100; }
        h1 { font-family: 'Montserrat', sans-serif; color: var(--oro); margin: 0; letter-spacing: 2px; font-size: 22px; }

        #app { padding: 15px; max-width: 600px; margin: auto; min-height: 80vh; }
        .card { background: var(--gris-fondo); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #244b42; }
        
        .btn { background: var(--oro); color: #050F0D; border: none; padding: 12px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-rojo { background: var(--rojo); color: white; }
        .btn-ghost { background: transparent; color: var(--oro); border: 1px solid var(--oro); }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #244b42; background: #050F0D; color: white; box-sizing: border-box; }

        /* Carrito y Menú */
        .pizza-card { display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--oro); font-weight: 700; font-size: 18px; }
        .badge { background: var(--rojo); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; position: absolute; margin-left: 15px; }

        /* Modal Scrolleable */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: var(--gris-fondo); margin: 5% auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; border: 1px solid var(--oro); }

        .ingrediente-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #244b42; }
        
        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: #050F0D; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--oro); }
        .nav-btn { color: #6a8b84; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-btn.active { color: var(--oro); }
    </style>
</head>
<body>

<header><h1>SAHARA PIZZERÍA</h1></header>

<div id="app"></div>

<div id="modalPizza" class="modal">
    <div class="modal-content">
        <h3 id="mSabor" style="color:var(--oro); margin-top:0"></h3>
        <div id="ingredientesList"></div>
        <button class="btn" style="background:var(--verde-exito)" onclick="cart.addToCart()">AÑADIR AL CARRITO</button>
        <button class="btn btn-rojo" onclick="ui.closeModal()">CANCELAR</button>
    </div>
</div>

<nav id="main-nav" class="nav" style="display:none">
    <div class="nav-btn" onclick="ui.renderMenu()">🍕<br>Menú</div>
    <div class="nav-btn" onclick="ui.renderCart()">🛒<br>Carrito <span id="cartCount" class="badge">0</span></div>
    <div id="nav-admin" class="nav-btn" onclick="ui.renderAdmin()">📊<br>Perfil</div>
</nav>

<script>
// --- CONFIGURACIÓN ---
const CONFIG = {
    URL: 'https://script.google.com/macros/s/AKfycbxRuWSGX24MbN6A2y8I4r0FcZpHPFTR2yvG-c-pOT8_WGnD9u-wzAXwOsF9mtq_AdA/exec',
    WS_PHONE: '593900000000', // <--- CAMBIA ESTO AQUÍ
    COSTO_EXTRA: 1.00
};

// --- ESTADO GLOBAL ---
let state = {
    user: JSON.parse(localStorage.getItem('sahara_session')) || null,
    menu: [],
    cart: [],
    tempPizza: null
};

// --- LÓGICA DE USUARIO ---
const auth = {
    async login() {
        const clave = document.getElementById('clave').value;
        if(!clave) return alert("Ingresa tu clave");
        
        try {
            const resp = await fetch(`${CONFIG.URL}?pestaña=Usuarios`);
            const users = await resp.json();
            const found = users.find(u => u.Token.toString() === clave);
            
            if(found) {
                state.user = found;
                localStorage.setItem('sahara_session', JSON.stringify(found));
                ui.initApp();
            } else {
                alert("Clave incorrecta");
            }
        } catch(e) { alert("Error de conexión"); }
    },

    loginGuest() {
        state.user = { Token: 0, Nombre: "Invitado", Rol: "GUEST" };
        ui.initApp();
    },

    async register() {
        const n = prompt("Tu Nombre:");
        const t = prompt("Tu Teléfono:");
        const k = prompt("Crea tu Clave (Token):");
        if(!n || !t || !k) return;

        const data = { accion: "REGISTRO_SIMPLE", pestaña: "Usuarios", datos: [k, n, "", "GUEST", "NO", "NO", "SI", "True", new Date()] };
        await fetch(CONFIG.URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("¡Cuenta creada! Ahora inicia sesión.");
    },

    logout() {
        localStorage.removeItem('sahara_session');
        location.reload();
    }
};

// --- LÓGICA DE CARRITO ---
const cart = {
    openCustom(index) {
        state.tempPizza = { ...state.menu[index], extras: [] };
        document.getElementById('mSabor').innerText = state.tempPizza.Sabor;
        const list = document.getElementById('ingredientesList');
        list.innerHTML = "<h4>Ajustar Ingredientes:</h4>";
        
        // Ingredientes base (ejemplo sacado de tus columnas)
        const base = ['Masa', 'Pomo', 'Queso', 'Jamon', 'Peppe', 'Champ'];
        base.forEach(ing => {
            if(state.tempPizza[ing+'_g'] > 0) {
                list.innerHTML += `
                    <div class="ingrediente-row">
                        <span>${ing}</span>
                        <input type="checkbox" checked onchange="cart.toggleIng('${ing}')">
                    </div>`;
            }
        });
        document.getElementById('modalPizza').style.display = 'block';
    },

    toggleIng(ing) {
        // Lógica simple para quitar/poner
    },

    addToCart() {
        state.cart.push(state.tempPizza);
        ui.closeModal();
        ui.updateCartBadge();
        alert("Añadido!");
    }
};

// --- INTERFAZ (UI) ---
const ui = {
    initApp() {
        document.getElementById('main-nav').style.display = 'flex';
        this.renderMenu();
    },

    renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="card" style="text-align:center">
                <h2 style="color:var(--oro)">INICIO DE SESIÓN</h2>
                <input type="password" id="clave" placeholder="Ingresa tu Clave" onkeypress="if(event.key==='Enter') auth.login()">
                <button class="btn" onclick="auth.login()">Entrar</button>
                <button class="btn btn-ghost" onclick="auth.loginGuest()" style="margin-top:15px">Continuar como Invitado</button>
                <p onclick="auth.register()" style="font-size:12px; cursor:pointer; margin-top:20px; text-decoration:underline">¿No tienes cuenta? Regístrate</p>
            </div>`;
    },

    async renderMenu() {
        const container = document.getElementById('app');
        container.innerHTML = "<p>Cargando menú...</p>";
        if(state.menu.length === 0) {
            const r = await fetch(`${CONFIG.URL}?pestaña=Recetas_Finales`);
            state.menu = await r.json();
        }
        container.innerHTML = "<h2 style='color:var(--oro)'>NUESTRO MENÚ</h2>";
        state.menu.forEach((p, i) => {
            if(p.Activo === "True") {
                container.innerHTML += `
                <div class="card pizza-card">
                    <div><b>${p.Sabor}</b><br><small>${p.Tamaño}</small></div>
                    <div style="text-align:right">
                        <span class="price">$${p.Precio_Venta}</span><br>
                        <button class="btn" style="width:auto; padding:5px 10px" onclick="cart.openCustom(${i})">+</button>
                    </div>
                </div>`;
            }
        });
    },

    renderCart() {
        const container = document.getElementById('app');
        let total = 0;
        container.innerHTML = "<h2 style='color:var(--oro)'>TU PEDIDO</h2>";
        if(state.cart.length === 0) return container.innerHTML += "<p>El carrito está vacío</p>";
        
        state.cart.forEach(item => {
            total += item.Precio_Venta;
            container.innerHTML += `<div class="card">${item.Sabor} - $${item.Precio_Venta}</div>`;
        });

        container.innerHTML += `
            <div class="card">
                <h3>Total: $${total.toFixed(2)}</h3>
                <select id="finalType">
                    <option value="mesa">En Mesa</option>
                    <option value="pickup">Recoger</option>
                    <option value="delivery">A domicilio</option>
                </select>
                <button class="btn" style="background:var(--verde-exito)" onclick="ui.checkout(${total})">CONFIRMAR TODO</button>
            </div>`;
    },

    async checkout(total) {
        const type = document.getElementById('finalType').value;
        if(type === 'delivery') {
            window.open(`https://wa.me/${CONFIG.WS_PHONE}?text=Hola! Quiero confirmar mi pedido de $${total}. Aquí mi ubicación:`);
        }
        alert("Pedido enviado a cocina. ¡Gracias!");
        state.cart = [];
        this.updateCartBadge();
        this.renderMenu();
    },

    renderAdmin() {
        document.getElementById('app').innerHTML = `
            <div class="card">
                <h2 style="color:var(--oro)">MI PERFIL</h2>
                <p>Hola, ${state.user.Nombre}</p>
                <button class="btn btn-rojo" onclick="auth.logout()">CERRAR SESIÓN</button>
                <hr style="border-color:#244b42; margin:20px 0">
                <button class="btn btn-ghost" onclick="window.open('https://docs.google.com/spreadsheets/d/1qCZ74rC_kX-eG-C8Xz-g1x_xXm8f7_S7RFb8/edit')">ADMINISTRAR EXCEL</button>
            </div>`;
    },

    closeModal() { document.getElementById('modalPizza').style.display = 'none'; },
    updateCartBadge() { document.getElementById('cartCount').innerText = state.cart.length; }
};

// --- INICIO ---
if(state.user) ui.initApp(); else ui.renderLogin();
</script>
</body>
</html>
