<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara Pizzería | Sistema de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37;
            --negro: #121212;
            --gris: #1E1E1E;
            --blanco: #FFFFFF;
            --verde: #27AE60;
        }

        body { font-family: 'Open Sans', sans-serif; background: var(--negro); color: var(--blanco); margin: 0; padding-bottom: 80px; }
        header { background: var(--gris); padding: 20px; text-align: center; border-bottom: 3px solid var(--oro); }
        h1 { font-family: 'Montserrat', sans-serif; color: var(--oro); margin: 0; letter-spacing: 3px; text-transform: uppercase; }

        #app { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--gris); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .btn { background: var(--oro); color: var(--negro); border: none; padding: 15px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-verde { background: var(--verde); color: white; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }

        /* Estilo Menú */
        .pizza-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 15px 0; }
        .pizza-info h3 { margin: 0; font-size: 18px; }
        .pizza-info span { color: var(--oro); font-size: 14px; font-weight: 600; }
        .price { font-weight: 700; color: var(--oro); }

        /* Nav Inferior */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--gris); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--oro); }
        .nav-btn { color: #888; text-decoration: none; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-btn.active { color: var(--oro); }
    </style>
</head>
<body>

<header><h1>Sahara</h1></header>

<div id="app">
    <div id="login-screen" class="card">
        <h2 style="text-align:center; color:var(--oro)">ACCESO</h2>
        <input type="password" id="token" placeholder="Introduce tu Token" style="text-align:center">
        <button class="btn" onclick="app.login()">Entrar</button>
    </div>
</div>

<nav id="main-nav" class="nav" style="display:none">
    <div class="nav-btn" onclick="app.renderMenu()">🍕<br>Menú</div>
    <div class="nav-btn" onclick="app.renderKDS()">👨‍🍳<br>Cocina</div>
    <div class="nav-btn" onclick="app.renderAdmin()">📊<br>Admin</div>
</nav>

<script>
const CONFIG = {
    URL: 'https://script.google.com/macros/s/AKfycbwz8A3n-6_AvnEif_X0h3_Rl_QwLLV9oP2n82Xlhw-8uTRpV4k7-G0EywIH7j9C0C4/exec'
};

const app = {
    user: null,
    recetas: [],

    async login() {
        const token = document.getElementById('token').value;
        const resp = await fetch(`${CONFIG.URL}?pestaña=Usuarios`);
        const usuarios = await resp.json();
        
        this.user = usuarios.find(u => u.Token.toString() === token);
        
        if (this.user) {
            document.getElementById('main-nav').style.display = 'flex';
            this.renderMenu();
        } else {
            alert("Token no válido");
        }
    },

    async renderMenu() {
        const container = document.getElementById('app');
        container.innerHTML = "<p>Cargando sabores Sahara...</p>";
        
        if (this.recetas.length === 0) {
            const resp = await fetch(`${CONFIG.URL}?pestaña=Recetas_Finales`);
            this.recetas = await resp.json();
        }

        container.innerHTML = `<h2 style="color:var(--oro)">Menú</h2>`;
        this.recetas.forEach((p, index) => {
            container.innerHTML += `
                <div class="card pizza-item">
                    <div class="pizza-info">
                        <h3>${p.Sabor}</h3>
                        <span>${p.Tamaño}</span>
                    </div>
                    <div style="text-align:right">
                        <div class="price">$${p.Precio_Venta.toFixed(2)}</div>
                        <button class="btn" style="padding:5px 10px; font-size:10px; margin-top:5px" onclick="app.hacerPedido(${index})">Pedir</button>
                    </div>
                </div>`;
        });
    },

    async hacerPedido(index) {
        const p = this.recetas[index];
        const clienteNom = prompt("Nombre del Cliente:");
        if (!clienteNom) return;

        const confirmacion = confirm(`¿Confirmar ${p.Sabor} ${p.Tamaño} para ${clienteNom}?`);
        if (!confirmacion) return;

        // Estructura de datos para el Script Maestro v2
        const pedidoData = {
            accion: "REGISTRAR_PEDIDO",
            cliente_nombre: clienteNom,
            telefono: "S/N",
            sucursal_id: 1,
            tipo_servicio: "mesa",
            metodo_pago: "efectivo",
            total: p.Precio_Venta,
            items: [{
                pizza_id: index,
                nombre: p.Sabor,
                receta_id: p.Tamaño,
                cantidad: 1,
                precio_unitario: p.Precio_Venta
            }]
        };

        alert("Enviando pedido a la nube...");

        try {
            await fetch(CONFIG.URL, {
                method: 'POST',
                mode: 'no-cors', // Evita el error de las imágenes
                body: JSON.stringify(pedidoData)
            });
            alert("✅ ¡Pedido registrado en tu Excel!");
        } catch (e) {
            alert("Error al conectar");
        }
    },

    async renderKDS() {
        const container = document.getElementById('app');
        container.innerHTML = `<h2 style="color:var(--oro)">Cocina (Gramos)</h2>`;
        this.recetas.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <h3 style="margin:0">${p.Sabor} (${p.Tamaño})</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; font-family:monospace; font-size:14px">
                        <div>Masa: <b style="color:var(--oro)">${p.Masa_g}g</b></div>
                        <div>Queso: <b style="color:var(--oro)">${p.Queso_g}g</b></div>
                        <div>Pomo: <b style="color:var(--oro)">${p.Pomo_g}g</b></div>
                        <div>Jamón: <b style="color:var(--oro)">${p.Jamon_g || 0}g</b></div>
                    </div>
                </div>`;
        });
    },

    renderAdmin() {
        document.getElementById('app').innerHTML = `
            <div class="card">
                <h2 style="color:var(--oro)">Admin</h2>
                <p>Usuario: ${this.user.Nombre}</p>
                <p>Rol: ${this.user.Rol}</p>
                <hr>
                <button class="btn" onclick="window.open('https://docs.google.com/spreadsheets/d/1qCZ74rC_kX-eG-C8Xz-g1x_xXm8f7_S7RFb8/edit')">Abrir Excel Real</button>
            </div>`;
    }
};
</script>
</body>
</html>
