<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara - Sistema Integral</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro-sahara: #D4AF37;
            --negro-suave: #1A1A1A;
            --gris-oscuro: #2D2D2D;
            --blanco: #FFFFFF;
            --gris-claro: #B0B0B0;
            --verde-exito: #27AE60;
        }

        body { font-family: 'Open Sans', sans-serif; background: var(--negro-suave); color: var(--blanco); margin: 0; padding-bottom: 90px; }
        header { background: var(--gris-oscuro); padding: 15px; text-align: center; border-bottom: 2px solid var(--oro-sahara); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { font-family: 'Montserrat', sans-serif; color: var(--oro-sahara); margin: 0; letter-spacing: 2px; }
        
        #app { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--gris-oscuro); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #444; transition: 0.3s; }
        .card:hover { border-color: var(--oro-sahara); }
        
        .btn-primary { background: var(--oro-sahara); color: var(--negro-suave); border: none; padding: 14px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; text-transform: uppercase; }
        
        /* Estilo Cocina (Gramos) */
        .gramos-box { margin-top: 15px; background: #222; padding: 12px; border-radius: 8px; border: 1px dashed #555; }
        .item-g { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; }
        .g-label { color: var(--gris-claro); }
        .g-numb { color: var(--oro-sahara); font-family: 'Roboto Mono', monospace; font-weight: bold; }

        /* Navegación Inferior Estilo Sahara */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--gris-oscuro); display: flex; justify-content: space-around; align-items: center; height: 75px; border-top: 1px solid var(--oro-sahara); }
        .nav-item { color: var(--gris-claro); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--oro-sahara); }
        .order-btn { background: var(--oro-sahara); width: 75px; height: 75px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-top: -40px; border: 6px solid var(--negro-suave); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<header><h1>SAHARA</h1></header>

<div id="app">
    <div class="card" style="text-align: center;">
        <h3>BIENVENIDO</h3>
        <p>Ingresa tu Token de acceso</p>
        <input type="password" id="tokenInput" placeholder="••••">
        <button class="btn-primary" onclick="login()">ENTRAR</button>
    </div>
</div>

<nav class="bottom-nav" id="mainNav" style="display: none;">
    <div class="nav-item" onclick="renderHome()"><span>🏠</span><span>INICIO</span></div>
    <div class="nav-item order-btn" onclick="renderMenu()"> <span style="font-size: 30px;">🍕</span></div>
    <div class="nav-item" onclick="renderKDS()"><span>👨‍🍳</span><span>COCINA</span></div>
</nav>

<script>
    const CONFIG = {
        URL: 'https://script.google.com/macros/s/AKfycbxRuWSGX24MbN6A2y8I4r0FcZpHPFTR2yvG-c-pOT8_WGnD9u-wzAXwOsF9mtq_AdA/exec'
    };

    let userRole = '';
    let userName = '';

    function login() {
        const t = document.getElementById('tokenInput').value;
        if(t === '1234') { userRole = 'ADMIN'; userName = 'LP'; }
        else if(t === '5555') { userRole = 'STAFF'; userName = 'Cocina'; }
        else if(t === '0') { userRole = 'GUEST'; userName = 'Mesero'; }
        else { alert("Token Inválido"); return; }
        
        document.getElementById('mainNav').style.display = 'flex';
        renderHome();
    }

    async function callExcel(pestana) {
        try {
            const response = await fetch(`${CONFIG.URL}?pestaña=${pestana}`);
            return await response.json();
        } catch (e) {
            console.error("Error de conexión");
            return [];
        }
    }

    function renderHome() {
        document.getElementById('app').innerHTML = `
            <div class="card">
                <h2>Hola, ${userName}</h2>
                <p>Estás en el panel de <b>${userRole}</b>.</p>
                <hr style="border:0; border-top:1px solid #444; margin: 15px 0;">
                <p style="font-size: 14px; color: var(--gris-claro);">Usa el botón central para tomar pedidos o el icono del chef para ver la cocina.</p>
            </div>
        `;
    }

    async function renderMenu() {
        const app = document.getElementById('app');
        app.innerHTML = "<p style='text-align:center'>Cargando menú Sahara...</p>";
        const datos = await callExcel('Recetas_Finales');
        
        app.innerHTML = "<h2>TOMAR PEDIDO</h2>";
        datos.forEach(p => {
            app.innerHTML += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h3 style="margin:0">${p.Sabor}</h3>
                            <span style="color:var(--oro-sahara); font-size:12px;">${p.Tamaño}</span>
                        </div>
                        <button class="btn-primary" style="width:auto; padding: 8px 15px;" onclick="alert('Pedido enviado!')">AÑADIR</button>
                    </div>
                </div>
            `;
        });
    }

    async function renderKDS() {
        const app = document.getElementById('app');
        app.innerHTML = "<p style='text-align:center'>Consultando horno digital...</p>";
        const datos = await callExcel('Recetas_Finales');
        
        app.innerHTML = "<h2>👨‍🍳 COCINA (KDS)</h2>";
        datos.forEach(p => {
            app.innerHTML += `
                <div class="card">
                    <h3 style="margin:0">${p.Sabor} <span style="font-size:12px; color:var(--oro-sahara)">(${p.Tamaño})</span></h3>
                    <div class="gramos-box">
                        <div class="item-g"><span class="g-label">Masa</span><span class="g-numb">${p.Masa_g}g</span></div>
                        <div class="item-g"><span class="g-label">Pomodoro</span><span class="g-numb">${p.Pomo_g}g</span></div>
                        <div class="item-g"><span class="g-label">Queso</span><span class="g-numb">${p.Queso_g}g</span></div>
                        <div class="item-g"><span class="g-label">Jamón</span><span class="g-numb">${p.Jamon_g || 0}g</span></div>
                    </div>
                    <button class="btn-primary" style="background: var(--verde-exito); margin-top:15px;" onclick="this.parentElement.style.display='none'">MARCAR LISTO</button>
                </div>
            `;
        });
    }
</script>
</body>
</html>
