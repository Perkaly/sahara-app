<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara | Sistema Integral v4.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37;
            --verde-sahara: #0A1F1A;
            --gris-fondo: #16322C;
            --blanco #FFFFFF;
            --rojo: #922B21;
            --verde-exito: #1E8449;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background: var(--verde-sahara); 
            color: var(--blanco); 
            margin: 0; 
            overflow-x: hidden; 
            padding-bottom: 90px;
        }
        header { 
            background: #050F0D; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid var(--oro); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        h1 { 
            font-family: 'Montserrat', sans-serif; 
            color: var(--oro); 
            margin: 0; 
            letter-spacing: 2px; 
            font-size: 22px; 
 }

        #app { 
            padding: 15px; 
            max-width: 600px; 
            margin: auto; 
            min-height: 80vh; 
        }
        .card { 
            background: var(--gris-fondo); 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid #244b42; 
        }
        
        .btn { 
            background: var(--oro); 
            color: #050F0D; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: 700; 
            width: 100%; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 5px; 
        }
        .btn-rojo { 
            background: var(--rojo); 
            color: white; 
        }
        .btn-ghost { 
            background: transparent; 
            color: var(--oro); 
            border: 1px solid var(--oro); 
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: 1px solid #244b42; 
            background: #050F0D; 
            color: white; 
            box-sizing: border-box; 
        }

        /* Carrito y Menú */
        .pizza-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .price { 
            color: var(--oro); 
            font-weight: 700; 
            font-size: 18px; 
        }
        .badge { 
            background: var(--rojo); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 10px; 
            font-size: 12px; 
            position: absolute; 
            margin-left: 15px; 
        }

        /* Modal Scrolleable */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height 100%; 
            background: rgba(0,0,0,0.9); 
            overflow-y: auto; 
        }
        .modal-content { 
            background: var(--gris-fondo); 
            margin: 5% auto; 
            padding: 20px; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 450px; 
            border: 1px solid var(--oro); 
        }

        .ingrediente-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 0; 
            border-bottom: 1px solid #244b42; 
        }        
        /* Nav */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #050F0D; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid var(--oro); 
        }
        .nav-btn { 
            color: #6a8b84; 
            text-decoration: none; 
            font-size: 11px; 
            text-align: center; 
            cursor: pointer; 
        }
        .nav-btn.active { 
            color: var(--oro); 
        }
    </style>
</head>
<body>

<header><h1>SAHARA PIZZERÍA</h1></header>

<div id="app"></div>

<div id="modalPizza" classmodal">
    <div class="modal-content">
        <h3 id="mSabor" style="color:var(--oro); margin-top:0"></h3>
        <div id="ingredientesList"></div>
        <button class="btn" style="background:var(--verde-exito)" onclick="cart.addToCart()">AÑADIR AL CARRITO</button>
        <button class="btn btn-rojo" onclick="ui.closeModal()">CANCELAR</button>
    </div>
</div>

<nav id="main-nav" class="nav" style="display:none">
    <div class="nav-btn" onclick="ui.renderMenu()">🍕<br>Menú</div>
    <div class="nav-btn" onclick="ui.renderCart()">🛒<br>Carrito <span id="cartCount" class="badge">0</span></div>
    <div class="nav-btn" onclick="ui.renderProfile()">👤<br>Perfil</div>
</nav>

<script>
// --- CONFIGURACIÓN ---
const CONFIG = {
    URL: 'https://script.google.com/macros/s/AKfycbxRuWSGX24MbN6A2y8I4r0FcZpHPFTR2yvG-c-pOT8_WGnD9u-wzAXwOsF9mtq_AdA/exec',
    WS_PHONE: '+5930960915566' // 👉 CAMBIA ESTO POR TU NÚMERO REAL
};

// --- ESTADO GLOBAL ---
let state = {
    user: JSON.parse(localStorage.getItem('sahara_session')) || null,
    menu: [],
    cart: [],
    tempPizza: null
};

// --- LÓGICA DE USUARIO ---
const auth = {
    async login() {
        const clave = document.getElementById('clave').value;
        if(!clave) return alert("Ingresa tu clave");
        
        try {
            const resp = await fetch(`${CONFIG.URL}?pestaña=Usuarios`);
            const users = await resp.json();
            const found = users.find(u => u.Token?.toString() === clave);
            
            if(found) {
                state.user = found;
                localStorage.setItem('sahara_session', JSON.stringify(found));
                ui.initApp();
            } else {
                alert("Clave incorrecta");
            }
        catch(e) { 
            console.error("Error login:", e);
            alert("Error de conexión. Verifica tu internet.");
        }
    },

    loginGuest() {
        state.user = { Token: 0, Nombre: "Invitado", Rol: "GUEST" };
        ui.initApp();
    },

    logout() {
        localStorage.removeItem('sahara_session');
        location.reload();
    }
};

// --- LÓGICA DE CARRITO ---
const cart = {
    openCustom(index) {
        const p = state.menu[index];
        state.tempPizza = { 
            ...p,
            size: p.Tamaño,
            extras: []
        };

        document.getElementById('mSabor').innerText = `${p.Sabor} (${p.Tamaño})`;
        const list = document.getElementById('ingredientesList');
        
        // Tamaños
        list.innerHTML = `
            <h4>Tamaño</h4>
            <div class="ingrediente-row">
                <span>Personal</span>
                <input type="radio" name="size" value="Personal" ${p.Tamaño === 'Personal' ? 'checked' : ''} onchange="cart.selectSize('Personal')">
            </div>
            <div class="ingrediente-row">
                <span>Mediana</span>
                <input type="radio"="size" value="Mediana" ${p.Tamaño === 'Mediana' ? 'checked' : ''} onchange="cart.selectSize('Mediana')">
            </div>
            <div class="ingrediente-row">
                <span>Grande</span>
                <input type="radio" name="size" value="Grande" ${p.Tamaño === 'Grande' ? 'checked' : ''} onchange="cart.selectSize('Grande')">
            </div>

            <h4>Extras (+$1.00)</h4>
            <div class="ingrediente-row">
                <span>Extra Queso</span>
                <input type="checkbox" onchange="cart.toggleExtra('queso')">
            </div>
            <div class="ingrediente-row">
                <span>Extra Jamón</span>
                <input type="checkbox" onchange="cart.toggleExtra('j">
            </div>
            <div class="ingrediente-row">
                <span>Extra Pepperoni</span>
                <input type="checkbox" onchange="cart.toggleExtra('peppe')">
            </div>
            <div class="ingrediente-row">
                <span>Sin Cebolla</span>
                <input type="checkbox" onchange="cart.toggleExtra('sin_cebolla')">
            </div>
        `;

        document.getElementById('modalPizza').style.display = 'block';
    },

    selectSize(size) {
        state.tempPizza.size = size;
    },
    
    toggleExtra(extra) {
        if (!state.tempPizza.extras) state.tempPizza.extras = [];
        const i = state.tempPizza.extras.indexOf(extra);
        if (i === -1) {
            state.tempPizza.extras.push(extra);
        } else {
            state.tempPizza.extras.splice(i, 1);
        }
    },

    addToCart() {
        let precio = parseFloat(state.tempPizza.Precio_Venta) || 0;
        if (state.tempPizza.extras && state.tempPizza.extras.length > 0) {
            precio += state.tempPizza.extras.length * 1.00;
        }

        state.cart.push({
            sabor: state.tempPizza.Sabor,
            tamaño: state.tempPizza.size,
            precioFinal: parseFloat(precio.toFixed(2)),
            extras: [...(state.tempPizza.extras || [])]
        });

        ui.closeModal();
        ui.updateCartBadge();
        alert("✅ Añadido al carrito!");
    }
};

// --- INTERFAZ (UI) ---
const ui = {
    initApp() {
        document.getElementById('main-nav').style.display = 'flex';
        this.renderMenu();
    },

    renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="card" style="text-align:center">
                <h2 style="color:var(--oro)">INICIO DE SESIÓN</h2>
                <input type="password" id="clave" placeholder="Clave (ej: 1234)" onkeypress="if(event.key==='Enter') auth.login()">
                <button class="btn" onclick="auth.login()">Entrar</button>
                <button class="btn btn-ghost" onclick="auth.loginGuest()" style="margin-top:15px">Continuar como Invitado</button>
            </div>`;
    },

    async renderMenu() {
        const container = document.getElementById('app');
        container.innerHTML = "<p>Cargando menú...</p>";
        
        if (state.length === 0) {
            try {
                const resp = await fetch(`${CONFIG.URL}?pestaña=Recetas_Finales`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                
                const data = await resp.json();
                if (!Array.isArray(data) || data.length < 1) {
                    throw new Error("Formato inválido: esperaba array");
                }

                // Si la primera fila es encabezado, saltarla
                const rows = data[0].includes ? data.slice(1) : data;
                state.menu = rows.map(row => ({
                    Sabor: row[0] || "",
                    Tamaño: row[1] || "",
                    Masa_g: parseFloat(row[2]) || 0,
                    Pomo_g: parseFloat(row[3]) || 0,
                    Queso_g: parseFloat(row[4]) || 0,
                    Jamon_g: parseFloat(row[5]) || 0,
                    Peppe_g: parseFloat(row[6]) || 0,
                    Champ_g: parseFloat(row[7]) || 0,
                    Precio_Venta: parseFloat(row[8]) || 0,
                    Activo: row[9] === "TRUE" || row[9] === "True" || row[9] === "true"
                }));
            } catch (e) {
                console.error("Error cargando menú:", e);
                container.innerHTML = `
                    <div class="card" style="text-align:center; color:#f39c12">
                        <h3>⚠️ Menú no disponible</h3>
                        <p>Verifica:</p>
                        <ul style="text-align:left; padding-left:20px;">
                            <li>Que la pestaña <strong>Recetas_Finales</strong> exista en tu Google Sheet</li>
                            <li>Que tenga 9 columnas: Sabor, Tamaño, Masa_g, Pomo_g, Queso_g, Jamon_g, Peppe_g, Champ_g, Precio_Venta</li>
                            <li>Que no haya errores como #DIV/0! en las celdas</li>
                        </ul>
                        <button class="btn" onclick="ui.renderLogin()">Volver</button>
                    </div>`;
                return;
            }
        }

        container.innerHTML = "<h2 style='color:var(--oro)'>NUESTRO MENÚ</h2>";
        state.menu.forEach((p, i) => {
            if (p.Activo && p.Sabor) {
                container.innerHTML += `
                <div class="card pizza-card">
                    <div><b>${p.Sabor}</b><br><small>${p.Tamaño}</small></div>
                    <div style="text-align:right">
                        <span class="price">$${p.Precio_Venta}</span><br>
                        <button class="btn" style="width:auto; padding:5px 10px" onclick="cart.openCustom(${i})">+</button>
                    </div>
                </div>`;
            }
        });
    },

    renderCart() {
        const container = document.getElementById('app');
        let total = 0;
        container.innerHTML = "<h2 style='color:var(--oro)'>TU PEDIDO</h2>";
        
        if (state.cart.length === 0) {
            container.innerHTML += "<p>El carrito está vacío</p>";
            return;
        }
        
        state.cart.forEach(item => {
            total += item.precioFinal;
            container.innerHTML += `
                <div class="card">
                    ${item.sabor} • ${item.tamaño}
                    <br><span class="price">$${item.precioFinal}</span>
                    ${item.extras.length > 0 ? `<small>(${item.extras.join(', ')})</small>` : ''}
                </div>`;
        });

        container.innerHTML += `
            <div class="card">
                <h3>Total: $${total.toFixed(2)}</h3>
                <select id="finalType">
                    <option value="mesa">En Mesa</option>
                    <option value="pickup">Recoger</option>
                    <option value="delivery">A domicilio</option>
                </select>
                <button class="btn" style="background:var(--verde-exito)" onclick="ui.checkout(${total})">CONFIRMAR TODO</button>
            </div>`;
    },

    async checkout(total) {
        const type = document.getElementById('finalType').value;
        
        if (state.user.Rol === "GUEST") {
            const tel = prompt("📱 Tu teléfono (obligatorio para confirmar pedido):");
            if (!tel || tel.trim() === "") {
                alert("❌ Teléfono requerido para continuar");
                return;
            }
            
            const msg = encodeURIComponent(
                `Hola, quiero confirmar mi pedido de $${total.toFixed(2)}.\nTeléfono: ${tel}\nTipo: ${type.toUpperCase()}`
            );
            window.open(`https://wa.me/${CONFIG.WS_PHONE}?text=${msg}`, '_blank');
            alert("✅ Pedido enviado por WhatsApp. ¡Gracias!");
            state.cart = [];
            ui.updateCartBadge();
            ui.renderMenu();
            return;
        }

        // Para usuarios registrados (ADMIN/STAFF), aquí iría lógica futura
        alert("Pedido confirmado. En desarrollo.");
    },

    renderProfile() {
        if (!state.user) return ui.renderLogin();
        document.getElementById('app').innerHTML = `
            <div class="card">
                <h2 style="color:var(--oro)">MI PERFIL</h2>
                <p>Hola, ${state.user.Nombre}</p>
                <button class="btn btn-rojo" onclick="auth.logout()">CERRAR SESIÓN</button>
            </div>`;
    },

    closeModal() { 
        document.getElementById('modalPizza').style.display = 'none'; 
    },
    updateCartBadge() { 
        document.getElementById('cartCount').innerText = state.cart.length; 
    }
};

// --- INICIO ---
if (state.user) {
    ui.initApp();
} else {
    ui.renderLogin();
}
</script>
</body>
</html>
